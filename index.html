<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gilbert's Castle v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d15;color:#e8dcc8;font-family:'Courier New',monospace;display:flex;height:100vh;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;padding:8px}
#header{display:flex;justify-content:space-between;align-items:center;padding:8px;background:#1a1a28;border:2px solid #2a2a3a;margin-bottom:8px}
#title{color:#c9a227;font-size:18px;font-weight:bold}
#rooms{display:flex;gap:4px}
.room-tab{background:#1e1e2e;border:1px solid #3a3a4a;padding:4px 10px;cursor:pointer;font-size:11px;color:#888}
.room-tab:hover,.room-tab.active{background:#2a2a3a;color:#c9a227;border-color:#c9a227}
#cv{background:#0d0d15;border:2px solid #2a2a3a;cursor:crosshair;image-rendering:pixelated}
#sidebar{width:260px;display:flex;flex-direction:column;gap:8px;padding:8px;background:#0a0a12;border-left:2px solid #2a2a3a}
.pn{background:#1a1a28;border:2px solid #2a2a3a;padding:8px}
.st{color:#c9a227;font-size:12px;margin-bottom:6px;border-bottom:1px solid #3a3a4a;padding-bottom:4px}
.ro{flex:1;overflow-y:auto}
.ag{padding:6px;margin:4px 0;background:#1e1e2e;border-left:3px solid #444;cursor:pointer;font-size:11px}
.ag:hover,.ag.sel{background:#2a2a3a;border-left-color:#c9a227}
.ag .n{color:#e8dcc8}.ag .m{color:#666;font-size:10px}
.ch{flex:0 0 140px;overflow-y:auto}
#ch{font-size:10px;color:#888;max-height:100px;overflow-y:auto}
.em{color:#555;font-style:italic}
#detail{display:none}
#detail-content{font-size:11px;color:#aaa}
#detail-content b{color:#e8dcc8}
.sm{font-size:10px}
.gd{color:#c9a227}
#status{font-size:10px;color:#666;padding:4px;text-align:center}
</style>
</head>
<body>
<div id="main">
 <div id="header">
  <span id="title">Gilbert's Castle v2</span>
  <div id="rooms">
   <div class="room-tab active" onclick="setRoom('all')">All</div>
   <div class="room-tab" onclick="setRoom('throne')">Throne</div>
   <div class="room-tab" onclick="setRoom('work')">Work</div>
   <div class="room-tab" onclick="setRoom('library')">Library</div>
   <div class="room-tab" onclick="setRoom('armory')">Armory</div>
   <div class="room-tab" onclick="setRoom('tavern')">Tavern</div>
   <div class="room-tab" onclick="setRoom('alchemy')">Alchemy</div>
  </div>
 </div>
 <canvas id="cv" width="800" height="520"></canvas>
 <div id="status">Loading...</div>
</div>
<div id="sidebar">
 <div class="pn ro"><div class="st">Agent Roster</div><div id="ro"></div></div>
 <div class="pn ch"><div class="st">Chronicle</div><div id="ch"><div class="em">No tales yet...</div></div></div>
 <div id="detail" class="pn"><div class="st">Agent Intel</div><div id="detail-content"></div></div>
</div>
<script>
const W=800,H=520,cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let frame=0,sel=null,sessions=[],log=[],currentRoom='all',particles=[];
const ROOMS={all:{x:0,y:0,w:W,h:H},throne:{x:280,y:85,w:240,h:115},work:{x:200,y:210,w:400,h:170},
library:{x:30,y:85,w:240,h:115},armory:{x:530,y:85,w:240,h:115},tavern:{x:30,y:390,w:240,h:120},alchemy:{x:530,y:390,w:240,h:120}};
const WORKBENCHES=[{x:240,y:235,room:'work'},{x:360,y:235,room:'work'},{x:480,y:235,room:'work'},
{x:240,y:315,room:'work'},{x:360,y:315,room:'work'},{x:480,y:315,room:'work'}];
const COL={wizard:{p:'#6b3fa0',s:'#9c27b0'},knight:{p:'#607d8b',s:'#90a4ae'},archer:{p:'#2e7d32',s:'#4caf50'},
alchemist:{p:'#1565c0',s:'#42a5f5'},scribe:{p:'#6d4c41',s:'#8d6e63'}};
const agents=new Map();

// Particle system
function spawnParticle(x,y,type){
 const p={x,y,type,life:0,vx:(Math.random()-.5)*.3,vy:type==='bubble'?-0.5-Math.random()*.5:-0.15-Math.random()*.1,
  maxLife:type==='dust'?200:type==='firefly'?150:type==='spark'?60:100,
  size:type==='dust'?1:type==='firefly'?2:type==='spark'?1:1.5,
  color:type==='dust'?[210,190,150]:type==='firefly'?[255,220,100]:type==='spark'?[255,160,50]:[100,255,150]};
 particles.push(p);
}
function updateParticles(){
 for(let i=particles.length-1;i>=0;i--){
  const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life++;
  if(p.type==='spark')p.vy+=0.02;
  if(p.type==='firefly'&&Math.random()<0.03){p.vx=(Math.random()-.5)*.4;p.vy=(Math.random()-.5)*.4;}
  if(p.life>=p.maxLife||p.y<0||p.y>H)particles.splice(i,1);
 }
 if(particles.length>250)particles.splice(0,particles.length-250);
}
function drawParticles(){
 for(const p of particles){
  const alpha=Math.max(0,1-p.life/p.maxLife)*(p.type==='firefly'?0.3+0.5*Math.sin(p.life*.1):0.6);
  ctx.fillStyle=`rgba(${p.color[0]},${p.color[1]},${p.color[2]},${alpha.toFixed(2)})`;
  if(p.type==='bubble'||p.type==='firefly'){ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}
  else ctx.fillRect(p.x,p.y,p.size,p.size);
 }
}

// Sprite drawing
function dWizard(x,y,s,f){const p=(px,py,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x+px*s,y+py*s,w*s,h*s);};
p(7,0,2,1,'#6a0dad');p(6,1,4,1,'#6a0dad');p(5,2,6,1,'#7b1fa2');p(4,3,8,1,'#7b1fa2');p(3,4,10,1,'#4a0080');
p(7,1,2,1,f%3===1?'#fff176':'#fffde7');p(5,5,6,3,'#e8c89e');p(6,6,1,1,'#333');p(9,6,1,1,'#333');
const bs=f%3===1?1:0;p(5+bs,8,6,1,'#f5f5f5');p(4+bs,9,7,1,'#eee');p(5+bs,10,5,2,'#f5f5f5');
p(4,8,8,1,'#7b1fa2');p(3,9,10,5,'#6a0dad');p(2,11,12,3,'#7b1fa2');p(1,8,1,6,'#8d6e63');
p(0,6,3,2,f%3===1?'#80ff80':'#a0f0a0');p(4,14,3,1,'#4a0080');p(9,14,3,1,'#4a0080');}
function dKnight(x,y,s,f){const p=(px,py,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x+px*s,y+py*s,w*s,h*s);};
p(5,0,6,1,'#9e9e9e');p(4,1,8,4,'#bdbdbd');p(5,3,6,1,'#424242');p(8,0,2,1,'#f44336');
p(6,5,4,1,'#9e9e9e');p(4,6,8,3,'#bdbdbd');p(7,6,2,3,'#9e9e9e');p(2,6,3,2,'#bdbdbd');p(11,6,3,2,'#bdbdbd');
p(2,8,2,4,'#9e9e9e');p(12,8,2,4,'#9e9e9e');p(0,7,3,5,'#1565c0');p(13,6,1,8,'#bdbdbd');
p(13,f%3===1?7:8,1,1,'#fff');p(5,9,6,3,'#bdbdbd');p(5,12,3,2,'#757575');p(8,12,3,2,'#757575');}
function dArcher(x,y,s,f){const p=(px,py,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x+px*s,y+py*s,w*s,h*s);};
const hs=f%3===1?1:0;p(4,0,8,2,'#388e3c');p(3+hs,1,9-hs,2,'#2e7d32');p(5,2,6,1,'#1b5e20');
p(5,3,6,3,'#e8c89e');p(6,4,1,1,'#4e342e');p(9,4,1,1,'#4e342e');p(3,6,10,1,'#388e3c');p(2,7,12,6,'#2e7d32');
p(5,7,6,4,'#8d6e63');p(13,4,1,8,'#795548');p(1,6,2,5,'#795548');p(1,4,1,2,'#a1887f');p(1,3,1,1,'#757575');
p(5,12,3,2,'#4e342e');p(8,12,3,2,'#4e342e');}
function dAlch(x,y,s,f){const p=(px,py,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x+px*s,y+py*s,w*s,h*s);};
p(5,0,6,2,'#3e2723');p(5,1,3,1,f%3===2?'#e3f2fd':'#bbdefb');p(8,1,3,1,f%3===2?'#e3f2fd':'#bbdefb');
p(5,2,6,3,'#e8c89e');p(6,3,1,1,'#333');p(9,3,1,1,'#333');p(4,6,8,1,'#1a237e');p(3,7,10,6,'#283593');
p(12,7,3,4,'#69f0ae');p(13,f%3,1,1,'#fff');p(5,13,3,1,'#1a237e');p(8,13,3,1,'#1a237e');}
function dScribe(x,y,s,f){const p=(px,py,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x+px*s,y+py*s,w*s,h*s);};
p(5,0,6,2,'#5d4037');p(5,2,6,3,'#e8c89e');p(6,3,1,1,'#333');p(9,3,1,1,'#333');p(5,5,6,1,'#795548');
p(4,6,8,1,'#8d6e63');p(3,7,10,6,'#795548');p(4,10,8,1,'#d7ccc8');p(12,8,3,3,'#e8dcc8');
p(14,7+f%2,1,4,'#5d4037');p(5,13,3,1,'#6d4c41');p(8,13,3,1,'#6d4c41');}
function dKing(x,y,s,f){const p=(px,py,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x+px*s,y+py*s,w*s,h*s);};
p(5,0,6,1,'#c9a227');p(4,0,2,2,'#c9a227');p(10,0,2,2,'#c9a227');p(7,0,1,1,f%3===0?'#ff4444':'#c9a227');
p(5,1,6,2,'#c9a227');p(5,3,6,4,'#e8c89e');p(6,4,1,1,'#333');p(9,4,1,1,'#333');
p(4,7,8,2,'#7b1fa2');p(3,9,10,5,'#6b3fa0');p(4,9,1,5,'#f5f5f5');p(11,9,1,5,'#f5f5f5');
p(6,10,1,1,'#111');p(9,10,1,1,'#111');p(12,8,2,6,'#8d6e63');p(13,7,2,2,'#c9a227');
p(5,14,3,1,'#4a0080');p(8,14,3,1,'#4a0080');}
function dChar(type,x,y,s,f){
 if(type==='wizard')dWizard(x,y,s,f);else if(type==='knight')dKnight(x,y,s,f);
 else if(type==='archer')dArcher(x,y,s,f);else if(type==='alchemist')dAlch(x,y,s,f);
 else dScribe(x,y,s,f);
}

// Room drawing
function drawRooms(){
 // Floor tiles
 ctx.fillStyle='#1e1e2e';ctx.fillRect(0,85,W,435);
 for(let ty=85;ty<520;ty+=16)for(let tx=0;tx<W;tx+=16){
  ctx.fillStyle=((tx/16+ty/16)%2===0)?'#1e1e2e':'#1a1a28';ctx.fillRect(tx,ty,16,16);
 }
 // Header bar
 ctx.fillStyle='#2a2a3a';ctx.fillRect(0,0,W,85);ctx.fillStyle='#1a1a28';ctx.fillRect(0,82,W,3);
 // Dividing walls
 ctx.fillStyle='#2a2a3a';
 ctx.fillRect(274,85,2,115);ctx.fillRect(524,85,2,115);
 ctx.fillRect(0,200,280,4);ctx.fillRect(320,200,200,4);ctx.fillRect(560,200,240,4);
 ctx.fillRect(0,380,280,4);ctx.fillRect(320,380,200,4);ctx.fillRect(560,380,240,4);
 ctx.fillRect(274,384,2,136);ctx.fillRect(524,384,2,136);
 // Library
 ctx.fillStyle='#5d4e37';for(let r=0;r<3;r++){ctx.fillRect(35,95+r*30,180,5);
  for(let b=0;b<10;b++){ctx.fillStyle=['#8b2252','#2255aa','#228b44','#aa7722','#662288'][(b+r)%5];
   ctx.fillRect(38+b*17,80+r*30,12,15);}}
 ctx.fillStyle='#5d4e37';ctx.fillRect(200,145,50,25);ctx.fillStyle='#e8dcc8';ctx.fillRect(210,140,30,10);
 // Throne room
 ctx.fillStyle='#8b1a1a';ctx.fillRect(385,130,30,70);ctx.fillStyle='#3a3a4a';ctx.fillRect(350,90,100,35);
 ctx.fillStyle='#c9a227';ctx.fillRect(385,95,30,25);ctx.fillStyle='#a08020';ctx.fillRect(388,88,24,8);
 // Armory
 ctx.fillStyle='#5d4e37';ctx.fillRect(545,95,8,70);ctx.fillRect(585,95,8,70);ctx.fillRect(545,110,48,4);
 ctx.fillStyle='#aac';ctx.fillRect(555,85,3,45);ctx.fillRect(565,87,3,43);ctx.fillRect(575,85,3,45);
 ctx.fillStyle='#1565c0';ctx.fillRect(660,100,28,28);ctx.fillStyle='#884422';ctx.fillRect(710,100,28,28);
 // Workbenches
 for(const wb of WORKBENCHES){ctx.fillStyle='#5d4e37';ctx.fillRect(wb.x,wb.y,70,35);
  ctx.fillStyle='#e8dcc8';ctx.fillRect(wb.x+8,wb.y+8,18,5);ctx.fillStyle='#0d0d15';ctx.fillRect(wb.x+45,wb.y+10,8,8);}
 // Tavern
 ctx.fillStyle='#5d4e37';ctx.fillRect(45,420,100,14);
 for(let br=0;br<3;br++){ctx.fillStyle='#6b5030';ctx.fillRect(55+br*35,440,22,28);
  ctx.fillStyle='#888';ctx.fillRect(55+br*35,450,22,2);ctx.fillRect(55+br*35,460,22,2);}
 // Alchemy
 ctx.fillStyle='#333344';ctx.fillRect(600,440,45,35);ctx.fillStyle='#22aa44';ctx.fillRect(605,445,35,25);
 const bo=Math.sin(frame*.1)*3;ctx.fillStyle='#44ff66';ctx.fillRect(615+bo,438,5,5);ctx.fillRect(628-bo,440,4,4);
 ctx.fillStyle='#ff4400';ctx.fillRect(610,475,10,8);ctx.fillStyle='#ff6600';ctx.fillRect(622,475,10,8);
 ctx.fillStyle='#ffcc00';ctx.fillRect(615,477,5,4);
 // Gate
 ctx.fillStyle='#2a2a3a';ctx.fillRect(370,495,60,25);ctx.fillStyle='#555';
 for(let g=0;g<5;g++)ctx.fillRect(378+g*10,498,3,18);
 // Torches
 const TORCH=[{x:50,y:100},{x:245,y:100},{x:300,y:100},{x:500,y:100},{x:550,y:100},{x:745,y:100},{x:310,y:420},{x:490,y:420}];
 for(const t of TORCH){const fl=Math.sin(frame*.15+t.x)*2;ctx.fillStyle='#4a3a2a';ctx.fillRect(t.x,t.y,4,10);
  ctx.fillStyle='#ff6600';ctx.fillRect(t.x-1+fl,t.y-5,6,5);ctx.fillStyle='#ffcc00';ctx.fillRect(t.x+fl,t.y-3,4,3);
  if(frame%8===0)spawnParticle(t.x+2,t.y-5,'spark');}
}

// Agent logic
function getType(m){m=m.toLowerCase();if(m.includes('claude'))return'wizard';if(m.includes('gpt'))return'knight';
if(m.includes('gemini'))return'archer';if(m.includes('llama')||m.includes('mistral'))return'alchemist';return'scribe';}
function tick(){
 for(const[id,a]of agents){
  if(a.state==='entering'){a.x+=2;if(a.x>=a.targetX){a.x=a.targetX;a.state='working';}}
  else if(a.state==='leaving'){a.x-=2;if(a.x<-50)agents.delete(id);}
 }
}
async function loadSessions(){
 try{
  const r=await fetch('sessions.json?t='+Date.now());if(!r.ok)throw new Error();
  const d=await r.json();sessions=d.sessions||[];
  const ids=new Set(sessions.map(s=>s.key||s.id));
  for(const[id,a]of agents)if(!ids.has(id)&&a.state!=='leaving'){a.state='leaving';addLog(a.name+' departs');}
  sessions.forEach((s,i)=>{const id=s.key||s.id;if(!agents.has(id)){
   const wb=WORKBENCHES[i%WORKBENCHES.length];
   agents.set(id,{name:s.name||id.slice(0,12),type:getType(s.model||''),x:-40,y:wb.y-10,targetX:wb.x+25,
    state:'entering',status:s.status||'idle',model:s.model||'?',task:s.task||'',uptime:s.uptime||'',
    tokens:s.totalTokens||0,channel:s.channel||'',children:s.children||0});
   addLog(agents.get(id).name+' enters');for(let i=0;i<8;i++)spawnParticle(wb.x+30+Math.random()*20,wb.y+30,'dust');
  }else{const a=agents.get(id);a.status=s.status||'idle';a.task=s.task||a.task;a.tokens=s.totalTokens||a.tokens;}});
  document.getElementById('status').textContent='Updated '+new Date().toLocaleTimeString()+' | '+agents.size+' agents';
 }catch(e){document.getElementById('status').textContent='Fetch failed';}
}
function addLog(msg){log.unshift({t:new Date().toLocaleTimeString().slice(0,5),m:msg});if(log.length>20)log.pop();
 document.getElementById('ch').innerHTML=log.map(l=>`<div><span style="color:#666">${l.t}</span> ${l.m}</div>`).join('');}
function renderRoster(){
 document.getElementById('ro').innerHTML=sessions.length?sessions.map(s=>{
  const id=s.key||s.id;const a=agents.get(id);const c=a?COL[a.type]||COL.scribe:{p:'#666'};
  return`<div class="ag${sel===id?' sel':''}" onclick="pick('${id}')" style="border-left-color:${c.p}">
   <div class="n">${s.name||id.slice(0,20)}</div><div class="m">${s.model||'?'} | ${s.status||'idle'}</div></div>`;
 }).join(''):'<div class="em">No agents</div>';
}
window.pick=function(k){sel=sel===k?null:k;renderRoster();
 const dp=document.getElementById('detail'),dc=document.getElementById('detail-content');
 if(!sel){dp.style.display='none';return;}
 const a=agents.get(sel);if(!a){dp.style.display='none';return;}
 dp.style.display='block';
 dc.innerHTML=`<div style="margin-bottom:6px"><b>${a.name}</b></div>
  <div>Task: ${(a.task||'—').slice(0,100)}</div>
  <div style="margin-top:4px">Uptime: ${a.uptime||'—'} | ${(a.tokens||0).toLocaleString()} tokens</div>
  <div>Model: ${a.model} | Channel: ${a.channel||'—'}</div>
  ${a.children?'<div>Sub-agents: '+a.children+'</div>':''}`;
};
window.setRoom=function(r){currentRoom=r;document.querySelectorAll('.room-tab').forEach(t=>t.classList.remove('active'));
 document.querySelector(`.room-tab[onclick="setRoom('${r}')"]`).classList.add('active');};

// Main draw
function draw(){
 ctx.fillStyle='#0d0d15';ctx.fillRect(0,0,W,H);
 drawRooms();
 // Spawn ambient particles
 if(frame%10===0)spawnParticle(50+Math.random()*700,100+Math.random()*380,'dust');
 if(frame%25===0)spawnParticle(80+Math.random()*120,100+Math.random()*80,'firefly');
 if(frame%15===0)spawnParticle(615+Math.random()*20,438,'bubble');
 updateParticles();drawParticles();
 // King on throne
 dKing(382,100,3,Math.floor(frame/30));ctx.fillStyle='#c9a227';ctx.font='10px monospace';ctx.fillText('Dylan',385,145);
 // Agents
 for(const[id,a]of agents){
  if(a.status==='running'||a.status==='active'){
   const c=COL[a.type]||COL.scribe;const gr=ctx.createRadialGradient(a.x+24,a.y+20,0,a.x+24,a.y+20,28);
   gr.addColorStop(0,c.p+'66');gr.addColorStop(1,c.p+'00');ctx.fillStyle=gr;ctx.beginPath();ctx.arc(a.x+24,a.y+20,28,0,Math.PI*2);ctx.fill();
  }
  const sit=a.status==='idle'?3:0;dChar(a.type,a.x,a.y+sit,3,Math.floor(frame/20));
  ctx.fillStyle=sel===id?'#c9a227':'#888';ctx.font='9px monospace';ctx.fillText(a.name.slice(0,12),a.x,a.y+50);
 }
 frame++;tick();requestAnimationFrame(draw);
}
loadSessions();setInterval(loadSessions,10000);setInterval(renderRoster,2000);draw();
</script>
</body>
</html>
